name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # Кеш как резерв (на случай если Secret ещё не добавлен)
      - name: Cache debug keystore
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: android-debug-keystore-stable-v1

      # Основная логика: Secret → кеш → генерация
      - name: Setup debug keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p ~/.android
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "✅ Используем keystore из GitHub Secret (постоянный)"
            echo "$KEYSTORE_BASE64" | base64 -d > ~/.android/debug.keystore
          elif [ -f ~/.android/debug.keystore ]; then
            echo "✅ Keystore восстановлен из кеша"
          else
            echo "⚙️ Генерируем новый keystore..."
            keytool -genkeypair \
              -keystore ~/.android/debug.keystore \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US" \
              -noprompt
            echo ""
            echo "════════════════════════════════════════"
            echo "⚠️  СКОПИРУЙ СТРОКУ НИЖЕ И ДОБАВЬ В"
            echo "   GitHub → Settings → Secrets → Actions"
            echo "   Название: KEYSTORE_BASE64"
            echo "════════════════════════════════════════"
            base64 -w 0 ~/.android/debug.keystore
            echo ""
            echo "════════════════════════════════════════"
          fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Build Debug APK
        run: gradle assembleDebug
        working-directory: .

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SpeedRadar-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
